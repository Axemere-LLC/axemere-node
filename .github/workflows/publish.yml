name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install

      - run: pnpm -r build

      # --if-present must precede the script name, otherwise pnpm forwards it to
      # jest as an (unrecognized) CLI flag instead of consuming it itself.
      - run: pnpm -r --if-present test

      - name: Publish @axemere/gateway
        run: pnpm publish --filter @axemere/gateway --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @axemere/gateway-openai
        run: pnpm publish --filter @axemere/gateway-openai --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @axemere/gateway-anthropic
        run: pnpm publish --filter @axemere/gateway-anthropic --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
